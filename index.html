<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wuji 289 – Sacred Reading</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: black;
  color: gold;
  text-align: center;
}

h1 {
  color: gold;
  margin-top: 50px;
  font-size: 40px;
}

p {
  color: #ddd;
}

button {
  padding: 12px 25px;
  margin: 10px;
  border: none;
  background: gold;
  color: black;
  font-size: 16px;
  cursor: pointer;
  border-radius: 20px;
}

button:hover {
  background: #ffd700;
}

.card {
  margin-top: 30px;
}

img {
  width: 200px;
  border-radius: 10px;
  box-shadow: 0 0 20px gold;
}
</style>
</head>

<body>

<h1>🔮 Wuji 289 – Sacred Reading</h1>
<p>無極殿 | พลังต้นกำเนิดแห่งการหยั่งรู้</p>
<p>เปิดไพ่ อ่านพลัง เชื่อมต่อคำตอบของคุณ</p>

<button onclick="drawCard()">เปิดไพ่</button>

<div class="card" id="result"></div>

<!-- 💖 ขอพรความรัก -->
<h2>💖 ขอพรความรัก</h2>
<button onclick="loveWish()">รับคำพร</button>
<p id="loveResult"></p>

<script>

function drawCard(){

let cards = [
{
name: "The Sun ☀️",
img: "https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg",
text: "พลังบวก ความสำเร็จ และความชัดเจนกำลังเข้ามา"
},
{
name: "The Moon 🌙",
img: "https://upload.wikimedia.org/wikipedia/commons/7/7f/RWS_Tarot_18_Moon.jpg",
text: "ฟังเสียงข้างใน ระวังความไม่ชัดเจน"
},
{
name: "The Star ⭐",
img: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg",
text: "ความหวังใหม่ การเยียวยา และพลังจักรวาลกำลังหนุนคุณ"
}
];

let random = Math.floor(Math.random() * cards.length);
let card = cards[random];

document.getElementById("result").innerHTML = `
<h2>${card.name}</h2>
<img src="${card.img}">
<p>${card.text}</p>
`;
}

// 💖 ฟังก์ชันขอพรความรัก
function loveWish() {
  const wishes = [
    "รักที่ดีจะไม่ทำให้เธอต้องสงสัยคุณค่าตัวเอง",
    "คนที่ใช่จะเห็นค่าหัวใจเธอ",
    "ปล่อยความเจ็บเก่า แล้วเปิดรับรักใหม่",
    "ความรักที่มั่นคงกำลังเดินทางมา",
    "เริ่มจากรักตัวเอง แล้วทุกอย่างจะชัดขึ้น",
    "หัวใจเธอกำลังถูกเยียวยาอย่างงดงาม"
  ];

  const text = wishes[Math.floor(Math.random() * wishes.length)];
  document.getElementById("loveResult").innerText = text;
}

</script>

</body>
</html>
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 ไพ่จักรวาล - เนื้อคู่</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;
    background: black;
}

/* พื้นหลังจักรวาล */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("https://i.imgur.com/3MZ6XWn.jpg") no-repeat center center/cover;
    z-index: -1;
    filter: brightness(0.5);
}

/* กล่อง */
.container {
    padding: 30px;
}

/* ไพ่ */
.cards {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.card {
    width: 100px;
    height: 150px;
    background: rgba(255,255,255,0.1);
    border: 1px solid white;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.2);
}

/* ปุ่ม */
button {
    padding: 12px 20px;
    margin-top: 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    background: purple;
    color: white;
}

.result {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="container">
    <h1>🔮 ไพ่ 5 ใบ - สุ่มเนื้อคู่</h1>

    <button onclick="playSound(); drawCards();">
        🔊 เปิดพลังจักรวาล
    </button>

    <div class="cards" id="cards"></div>

    <div class="result" id="result"></div>
</div>

<!-- เสียง -->
<audio id="sound">
    <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3" type="audio/mpeg">
</audio>

<script>
const meanings = [
    "ความรักกำลังเริ่มต้น",
    "มีคนแอบคิดถึงคุณ",
    "อดีตยังผูกพัน",
    "เนื้อคู่กำลังใกล้เข้ามา",
    "ต้องเลือกเส้นทางหัวใจ",
    "พลังงานความรักนิ่งขึ้น",
    "จะพบคนสำคัญผ่านงาน",
    "ความสัมพันธ์กำลังเปลี่ยน"
];

function playSound() {
    document.getElementById("sound").play();
}

function drawCards() {
    const cards = document.getElementById("cards");
    const result = document.getElementById("result");

    cards.innerHTML = "";

    let selected = [];

    for (let i = 0; i < 5; i++) {
        let text = meanings[Math.floor(Math.random() * meanings.length)];
        selected.push(text);

        let div = document.createElement("div");
        div.className = "card";
        div.innerText = "🃏\n" + text;
        cards.appendChild(div);
    }

    result.innerHTML =
        "💫 พลังเนื้อคู่: " +
        selected[Math.floor(Math.random() * selected.length)];
}
</script>

</body>
</html>
